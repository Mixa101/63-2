{% extends 'base.html' %}
{% load static %}
{% block content %}
    {% for post in posts %}
    <div class="container card">
    <p>{{post.id}}  <h3>{{post.header}}</h3></p>
    {% if post.image %}
    <img src=" {{ post.image.url }}" class="card-img-top">
    {% else %}
    <img src="" alt="">
    {% endif %}
    </div>
    {% endfor %}
    {% endblock %}
</html>
